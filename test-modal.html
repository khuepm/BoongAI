<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Test Modal - BoongAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="popup.css" rel="stylesheet"/>
    <style>
      body {
        margin: 0;
        padding: 20px;
        min-height: 100vh;
      }
      .test-container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .dark .test-container {
        background: #111318;
      }
    </style>
</head>
<body class="font-body bg-gray-100 dark:bg-black text-on-surface dark:text-dark-on-surface">
    <div class="test-container">
        <h1 class="text-2xl font-bold mb-4">Test API Key Guide Modal</h1>
        <p class="mb-4 text-sm">Click the link below to test the modal:</p>
        <a href="#" id="api-guide-link" class="text-xs text-primary dark:text-dark-primary hover:underline">
            How to get an API key?
        </a>
        
        <div class="mt-4">
            <label class="block text-sm mb-2">Select Provider:</label>
            <select id="provider" class="w-full p-2 border rounded">
                <option value="openai">OpenAI</option>
                <option value="gemini">Google Gemini</option>
                <option value="claude">Anthropic Claude</option>
            </select>
        </div>
    </div>

    <!-- API Key Guide Modal -->
    <div id="api-guide-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-surface dark:bg-dark-surface rounded-lg shadow-xl max-w-md w-full mx-4 max-h-[90vh] overflow-hidden flex flex-col">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-outline dark:border-gray-600 flex items-center justify-between">
                <h2 class="text-lg font-medium text-on-surface dark:text-dark-on-surface">Get API Key</h2>
                <button id="close-modal" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <span class="material-symbols-outlined text-on-surface-variant dark:text-gray-400">close</span>
                </button>
            </div>
            
            <!-- Modal Content -->
            <div class="flex-1 overflow-y-auto p-6">
                <div id="guide-content">
                    <!-- Content will be dynamically populated -->
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="px-6 py-4 border-t border-outline dark:border-gray-600 flex justify-end gap-3">
                <button id="open-provider-site" class="px-4 py-2 bg-primary dark:bg-dark-primary text-on-primary dark:text-dark-on-primary rounded-md hover:bg-primary-variant dark:hover:bg-dark-primary-variant transition-colors font-medium">
                    Open <span id="provider-name">Provider</span> Site
                </button>
            </div>
        </div>
    </div>

    <script>
        // Simple test script
        const modal = document.getElementById('api-guide-modal');
        const guideLink = document.getElementById('api-guide-link');
        const closeBtn = document.getElementById('close-modal');
        const openSiteBtn = document.getElementById('open-provider-site');
        const providerSelect = document.getElementById('provider');
        const guideContent = document.getElementById('guide-content');
        const providerNameSpan = document.getElementById('provider-name');

        const guides = {
            openai: `
                <div class="guide-step">
                    <div class="flex items-start">
                        <span class="guide-step-number">1</span>
                        <div>
                            <div class="guide-step-title">Create OpenAI Account</div>
                            <div class="guide-step-description">
                                Visit <strong>platform.openai.com</strong> and sign up for an account.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="guide-step">
                    <div class="flex items-start">
                        <span class="guide-step-number">2</span>
                        <div>
                            <div class="guide-step-title">Add Payment Method</div>
                            <div class="guide-step-description">
                                Go to <strong>Billing → Payment methods</strong> and add a credit card.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="guide-step">
                    <div class="flex items-start">
                        <span class="guide-step-number">3</span>
                        <div>
                            <div class="guide-step-title">Generate API Key</div>
                            <div class="guide-step-description">
                                Navigate to <strong>API keys</strong> and click <strong>"Create new secret key"</strong>.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="guide-warning">
                    <div class="guide-warning-title">
                        <span class="material-symbols-outlined text-[16px] mr-2">warning</span>
                        Important Security Note
                    </div>
                    <div class="guide-warning-description">
                        Keep your API key secure and never share it publicly.
                    </div>
                </div>
            `,
            gemini: `
                <div class="guide-step">
                    <div class="flex items-start">
                        <span class="guide-step-number">1</span>
                        <div>
                            <div class="guide-step-title">Access Google AI Studio</div>
                            <div class="guide-step-description">
                                Visit <strong>makersuite.google.com</strong> and sign in with your Google account.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="guide-step">
                    <div class="flex items-start">
                        <span class="guide-step-number">2</span>
                        <div>
                            <div class="guide-step-title">Navigate to API Keys</div>
                            <div class="guide-step-description">
                                Click on <strong>"Get API key"</strong> in the left sidebar.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="guide-warning">
                    <div class="guide-warning-title">
                        <span class="material-symbols-outlined text-[16px] mr-2">info</span>
                        Free Tier Available
                    </div>
                    <div class="guide-warning-description">
                        Google Gemini offers a generous free tier with rate limits.
                    </div>
                </div>
            `,
            claude: `
                <div class="guide-step">
                    <div class="flex items-start">
                        <span class="guide-step-number">1</span>
                        <div>
                            <div class="guide-step-title">Create Anthropic Account</div>
                            <div class="guide-step-description">
                                Visit <strong>console.anthropic.com</strong> and create an account.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="guide-step">
                    <div class="flex items-start">
                        <span class="guide-step-number">2</span>
                        <div>
                            <div class="guide-step-title">Add Credits</div>
                            <div class="guide-step-description">
                                Go to <strong>Settings → Billing</strong> and add credits.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="guide-warning">
                    <div class="guide-warning-title">
                        <span class="material-symbols-outlined text-[16px] mr-2">account_balance_wallet</span>
                        Credit-Based Pricing
                    </div>
                    <div class="guide-warning-description">
                        Anthropic uses prepaid credits. Monitor your usage in the console.
                    </div>
                </div>
            `
        };

        const providerNames = {
            openai: 'OpenAI',
            gemini: 'Google',
            claude: 'Anthropic'
        };

        function showModal() {
            const provider = providerSelect.value;
            guideContent.innerHTML = guides[provider];
            providerNameSpan.textContent = providerNames[provider];
            modal.classList.remove('hidden');
        }

        function hideModal() {
            modal.classList.add('hidden');
        }

        guideLink.addEventListener('click', (e) => {
            e.preventDefault();
            showModal();
        });

        closeBtn.addEventListener('click', hideModal);

        openSiteBtn.addEventListener('click', () => {
            const urls = {
                openai: 'https://platform.openai.com/api-keys',
                gemini: 'https://makersuite.google.com/app/apikey',
                claude: 'https://console.anthropic.com/settings/keys'
            };
            window.open(urls[providerSelect.value], '_blank');
            hideModal();
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                hideModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                hideModal();
            }
        });

        providerSelect.addEventListener('change', () => {
            if (!modal.classList.contains('hidden')) {
                showModal();
            }
        });
    </script>
</body>
</html>
