<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <title>BoongAI Settings</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="popup.css" rel="stylesheet"/>
    <style>
      /* Ensure popup fits tightly if opened as browser action */
      body {
        margin: 0;
        width: 320px;
        min-height: 450px;
        max-height: 600px;
        overflow: hidden;
      }
      
      .guide-section {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
      }
      
      .guide-section.expanded {
        max-height: 400px;
        overflow-y: auto;
      }
    </style>
</head>
<body class="font-body bg-gray-100 dark:bg-black text-on-surface dark:text-dark-on-surface flex items-center justify-center m-0 p-0">
    <div class="w-[320px] bg-surface dark:bg-dark-surface rounded-none shadow-none flex flex-col relative transition-colors duration-300">
        <div class="px-6 pt-6 pb-2 flex items-center justify-between shrink-0">
            <h1 class="text-2xl font-normal text-on-surface dark:text-dark-on-surface tracking-normal font-display">BoongAI</h1>
            <label class="m3-switch relative inline-flex items-center cursor-pointer">
                <input checked="" class="sr-only peer" type="checkbox" id="active-toggle"/>
                <div class="w-[52px] h-8 bg-surface-variant dark:bg-gray-700 border-2 border-outline dark:border-gray-500 peer-focus:outline-none rounded-full transition-all duration-300 relative flex items-center">
                    <div class="switch-thumb absolute left-[2px] top-[50%] -translate-y-1/2 h-6 w-6 bg-outline dark:bg-gray-400 rounded-full transition-all duration-300 z-10 flex items-center justify-center shadow-md">
                        <span class="material-symbols-outlined text-[16px] text-surface dark:text-dark-surface transition-opacity duration-200 opacity-0 switch-icon-off">close</span>
                        <span class="material-symbols-outlined text-[16px] text-on-primary dark:text-dark-on-primary transition-opacity duration-200 opacity-0 switch-icon-on absolute">check</span>
                    </div>
                </div>
            </label>
        </div>
        <div class="overflow-y-auto px-6 py-2 flex flex-col gap-5">
            <p class="text-sm text-on-surface-variant dark:text-gray-400 mb-1 leading-snug">
                Configure your AI assistant settings below.
            </p>
            <div class="flex flex-col gap-5 pt-2">
                <div class="relative group">
                    <select class="peer has-value w-full h-[56px] bg-transparent border border-outline dark:border-gray-500 rounded-[4px] px-4 pt-1 text-on-surface dark:text-dark-on-surface focus:border-primary dark:focus:border-dark-primary focus:border-2 focus:outline-none appearance-none cursor-pointer text-base" id="provider">
                        <option value="openai">OpenAI</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="claude">Anthropic Claude</option>
                    </select>
                    <label class="floating-label absolute left-3 transition-all duration-200 pointer-events-none font-normal z-10 px-1" for="provider">
                        AI Provider
                    </label>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant dark:text-gray-400">
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </div>
                </div>
                <div class="relative group">
                    <select class="peer has-value w-full h-[56px] bg-transparent border border-outline dark:border-gray-500 rounded-[4px] px-4 pt-1 text-on-surface dark:text-dark-on-surface focus:border-primary dark:focus:border-dark-primary focus:border-2 focus:outline-none appearance-none cursor-pointer text-base" id="model">
                        <option value="gpt-4">GPT-4</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    </select>
                    <label class="floating-label absolute left-3 transition-all duration-200 pointer-events-none font-normal z-10 px-1" for="model">
                        AI Model
                    </label>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant dark:text-gray-400">
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </div>
                </div>
                <div class="relative group">
                    <input class="peer w-full h-[56px] bg-transparent border border-outline dark:border-gray-500 rounded-[4px] px-4 pr-24 text-on-surface dark:text-dark-on-surface focus:border-primary dark:focus:border-dark-primary focus:border-2 focus:outline-none text-base placeholder-transparent font-mono" id="apikey" placeholder=" " type="password" value=""/>
                    <label class="floating-label absolute left-3 transition-all duration-200 pointer-events-none font-normal z-10 px-1" for="apikey">
                        API Key
                    </label>
                    <div class="absolute inset-y-0 right-0 flex items-center gap-2 px-3">
                        <div id="connection-indicator" class="w-3 h-3 rounded-full bg-gray-400 dark:bg-gray-600 transition-colors duration-200" title="Not validated"></div>
                        <button id="toggle-password" class="flex items-center text-on-surface-variant dark:text-gray-400 hover:text-on-surface dark:hover:text-dark-on-surface transition-colors duration-200 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700" type="button" aria-label="Toggle API key visibility">
                            <span id="toggle-password-icon" class="material-symbols-outlined text-[20px] transition-all duration-200">visibility</span>
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <p id="validation-error" class="text-xs flex-1 mt-1 hidden" role="alert"></p>
                    <button id="test-connection" class="text-xs px-3 py-1.5 bg-primary dark:bg-dark-primary text-on-primary dark:text-dark-on-primary rounded hover:bg-primary-variant dark:hover:bg-dark-primary-variant transition-colors font-medium whitespace-nowrap" type="button">
                        Test Connection
                    </button>
                </div>
            </div>
            
            <!-- Inline Guide Section -->
            <div class="guide-section" id="guide-section">
                <div class="border-t border-outline dark:border-gray-600 pt-4 mt-2">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-sm font-medium text-on-surface dark:text-dark-on-surface">How to get <span id="provider-name-inline">OpenAI</span> API Key</h3>
                        <button id="close-guide" class="p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <span class="material-symbols-outlined text-[18px] text-on-surface-variant dark:text-gray-400">close</span>
                        </button>
                    </div>
                    <div id="guide-content" class="text-xs space-y-3">
                        <!-- Content will be dynamically populated -->
                    </div>
                    <button id="open-provider-site" class="w-full mt-4 px-4 py-2 bg-primary dark:bg-dark-primary text-on-primary dark:text-dark-on-primary rounded-md hover:bg-primary-variant dark:hover:bg-dark-primary-variant transition-colors font-medium text-sm">
                        Open <span id="provider-name">OpenAI</span> Site
                    </button>
                </div>
            </div>
        </div>
        <div class="p-6 pt-2 bg-surface dark:bg-dark-surface flex flex-col gap-3 border-t border-outline dark:border-gray-600">
            <div class="text-center">
                <p class="text-xs leading-relaxed text-on-surface-variant dark:text-gray-400 mb-2">
                    Type <span class="text-primary dark:text-dark-primary font-bold">@BoongAI</span> [your request] in Facebook comments to activate the assistant.
                </p>
                <button id="api-guide-link" class="text-xs text-primary dark:text-dark-primary hover:underline cursor-pointer bg-transparent border-0">
                    How to get an API key?
                </button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
